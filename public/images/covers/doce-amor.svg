<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Capa: Doce Amor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A85F2A"/>
      <stop offset="0.5" stop-color="#5A1018"/>
      <stop offset="1" stop-color="#0E0B0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.8">
      <stop offset="0" stop-color="#E0A64B" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#E0A64B" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g stroke="#E0A64B" stroke-opacity="0.16" fill="none">
    <circle cx="180" cy="220" r="120"/>
    <circle cx="180" cy="220" r="180"/>
    <circle cx="180" cy="220" r="240"/>
  </g>
  <rect width="800" height="800" fill="#000" opacity="0.35" filter="url(#grain)"/>
  <text x="64" y="120" font-family="Georgia, serif" font-size="24" letter-spacing="8" fill="#E0A64B" opacity="0.85">RICO SAMBA</text>
  <text x="64" y="600" font-family="Georgia, serif" font-weight="700" font-size="118" fill="#D8C39A">Doce</text>
  <text x="64" y="700" font-family="Georgia, serif" font-weight="700" font-size="118" fill="#D8C39A">Amor</text>
  <rect x="480" y="666" width="120" height="4" fill="#E0A64B"/>
</svg>
