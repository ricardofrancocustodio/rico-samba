<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Capa: Amor e Razão">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A85F2A"/>
      <stop offset="0.5" stop-color="#3A2418"/>
      <stop offset="1" stop-color="#0E0B0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.75" r="0.85">
      <stop offset="0" stop-color="#E0A64B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E0A64B" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g stroke="#E0A64B" stroke-opacity="0.14" fill="none">
    <circle cx="200" cy="600" r="130"/>
    <circle cx="200" cy="600" r="200"/>
    <circle cx="200" cy="600" r="270"/>
  </g>
  <rect width="800" height="800" fill="#000" opacity="0.35" filter="url(#grain)"/>
  <text x="64" y="120" font-family="Georgia, serif" font-size="24" letter-spacing="8" fill="#E0A64B" opacity="0.85">RICO SAMBA</text>
  <text x="64" y="470" font-family="Georgia, serif" font-weight="700" font-size="120" fill="#D8C39A">Amor</text>
  <text x="64" y="580" font-family="Georgia, serif" font-weight="400" font-size="88" fill="#D8C39A" opacity="0.85" font-style="italic">e Razão</text>
  <rect x="66" y="630" width="120" height="4" fill="#E0A64B"/>
</svg>
