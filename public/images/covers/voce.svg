<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Capa: Você">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A1018"/>
      <stop offset="0.55" stop-color="#3A2418"/>
      <stop offset="1" stop-color="#0E0B0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.7" cy="0.25" r="0.8">
      <stop offset="0" stop-color="#E0A64B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#E0A64B" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g stroke="#C89A3C" stroke-opacity="0.16" fill="none">
    <circle cx="600" cy="200" r="120"/>
    <circle cx="600" cy="200" r="180"/>
    <circle cx="600" cy="200" r="240"/>
  </g>
  <rect width="800" height="800" fill="#000" opacity="0.35" filter="url(#grain)"/>
  <text x="64" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="24" letter-spacing="8" fill="#C89A3C" opacity="0.85">RICO SAMBA</text>
  <text x="64" y="660" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="150" fill="#D8C39A">Você</text>
  <rect x="66" y="700" width="120" height="4" fill="#C89A3C"/>
  <text x="200" y="712" font-family="Georgia, serif" font-size="26" fill="#D8C39A" opacity="0.7" font-style="italic">Jeito de Sambar</text>
</svg>
