<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Capa: Brigas">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A2418"/>
      <stop offset="0.5" stop-color="#5A1018"/>
      <stop offset="1" stop-color="#0E0B0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#A85F2A" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#A85F2A" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g stroke="#C89A3C" stroke-opacity="0.14" fill="none">
    <circle cx="560" cy="560" r="130"/>
    <circle cx="560" cy="560" r="200"/>
    <circle cx="560" cy="560" r="270"/>
  </g>
  <rect width="800" height="800" fill="#000" opacity="0.35" filter="url(#grain)"/>
  <text x="64" y="120" font-family="Georgia, serif" font-size="24" letter-spacing="8" fill="#C89A3C" opacity="0.85">RICO SAMBA</text>
  <text x="64" y="640" font-family="Georgia, serif" font-weight="700" font-size="150" fill="#D8C39A">Brigas</text>
  <rect x="66" y="680" width="120" height="4" fill="#C89A3C"/>
</svg>
