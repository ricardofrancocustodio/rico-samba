<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Capa: Saudade">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E3B24"/>
      <stop offset="0.55" stop-color="#0E0B0A"/>
      <stop offset="1" stop-color="#0E0B0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.25" r="0.85">
      <stop offset="0" stop-color="#C89A3C" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#C89A3C" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g stroke="#C89A3C" stroke-opacity="0.13" fill="none">
    <circle cx="400" cy="230" r="120"/>
    <circle cx="400" cy="230" r="180"/>
    <circle cx="400" cy="230" r="240"/>
  </g>
  <rect width="800" height="800" fill="#000" opacity="0.35" filter="url(#grain)"/>
  <text x="64" y="120" font-family="Georgia, serif" font-size="24" letter-spacing="8" fill="#C89A3C" opacity="0.85">RICO SAMBA</text>
  <text x="64" y="640" font-family="Georgia, serif" font-weight="400" font-size="140" fill="#D8C39A" font-style="italic">Saudade</text>
  <rect x="66" y="680" width="120" height="4" fill="#C89A3C"/>
</svg>
